name: Production (Build-Push)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  repository_dispatch:
    types: [ baudi_data_prod_latest, portal_app_prod_latest ]
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Docker buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Download data package
      run: |
        # Prefer the release with the title "BauDi Data (Development)".
        # If not found, fall back to the tag 'prod-latest'.
        RELEASES_JSON=$(curl -s -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/Baumann-Digital/baudi-data/releases)

        DOWNLOAD_URL=$(echo "$RELEASES_JSON" | jq -r '.[] | select(.name=="BauDi Data (Development)") | .assets[] | select(.name|endswith(".xar")) | .browser_download_url' | head -n1)

        if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
          echo "Release 'BauDi Data (Development)' not found — falling back to tag 'prod-latest'"
          LATEST_RELEASE=$(curl -L -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Baumann-Digital/baudi-data/releases/tags/prod-latest)
          DOWNLOAD_URL=$(echo "$LATEST_RELEASE" | jq -r '.assets[] | select(.name|endswith(".xar")) | .browser_download_url')
        fi

        if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
          echo "Error: No .xar asset found for selected release" && exit 1
        fi

        # Download the asset
        curl -L -o autodeploy/baudiData-prod-latest.xar "$DOWNLOAD_URL"

        echo "Data package downloaded successfully"
        ls -la autodeploy/
    
    - name: Download the portal-app software
      run: |
        # Get all releases and filter out 'dev-latest', then select the latest versioned release
        RELEASES_JSON=$(curl -L -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/Baumann-Digital/portal-app/releases)
        
        # Get the latest release that is NOT 'dev-latest'
        LATEST_RELEASE=$(echo "$RELEASES_JSON" | jq -r '[.[] | select(.tag_name != "dev-latest")] | .[0]')
        
        # Extract the browser download URL for the .xar asset
        DOWNLOAD_URL=$(echo "$LATEST_RELEASE" | jq -r '.assets[] | select(.name | endswith(".xar")) | .browser_download_url')
        
        # Check if download URL was found
        if [ "$DOWNLOAD_URL" = "null" ] || [ -z "$DOWNLOAD_URL" ]; then
          echo "Error: No .xar asset found in the latest release"
          echo "Available assets:"
          echo "$LATEST_RELEASE" | jq -r '.assets[].name'
          exit 1
        fi
        
        RELEASE_TAG=$(echo "$LATEST_RELEASE" | jq -r '.tag_name')
        echo "Using release: $RELEASE_TAG"
        echo "Downloading from: $DOWNLOAD_URL"
        
        # Download the asset
        curl -L -o autodeploy/baudiApp-latest.xar "$DOWNLOAD_URL"
        
        # Verify the download
        if [ ! -f "autodeploy/baudiApp-latest.xar" ] || [ ! -s "autodeploy/baudiApp-latest.xar" ]; then
          echo "Error: Download failed or file is empty"
          exit 1
        fi
        
        echo "Software package downloaded successfully"
        ls -la autodeploy/

    - name: Download the Edirom software
      run: |
        # Get the latest release
        LATEST_RELEASE=$(curl -s "https://api.github.com/repos/Edirom/Edirom-Online/releases/191696703")
        
        # Extract the browser download URL for the .xar asset
        DOWNLOAD_URL=$(echo "$LATEST_RELEASE" | jq -r '.assets[] | select(.name | endswith(".xar")) | .browser_download_url')
        
        # Check if download URL was found
        if [ "$DOWNLOAD_URL" = "null" ] || [ -z "$DOWNLOAD_URL" ]; then
          echo "Error: No .xar asset found in the latest release"
          echo "Available assets:"
          echo "$LATEST_RELEASE" | jq -r '.assets[].name'
          exit 1
        fi
        
        echo "Downloading from: $DOWNLOAD_URL"
        
        # Download the asset
        curl -L -o autodeploy/edirom-v100.xar "$DOWNLOAD_URL"
        
        # Verify the download
        if [ ! -f "autodeploy/edirom-v100.xar" ] || [ ! -s "autodeploy/edirom-v100.xar" ]; then
          echo "Error: Download failed or file is empty"
          exit 1
        fi
        
        echo "Edirom Software package downloaded successfully"
        ls -la autodeploy/

    - name: Download the crApp software
      run: |
        # Get the latest release
        LATEST_RELEASE=$(curl -s "https://api.github.com/repos/riedde/crApp/releases/latest")
        
        # Extract the browser download URL for the .xar asset
        DOWNLOAD_URL=$(echo "$LATEST_RELEASE" | jq -r '.assets[] | select(.name | endswith(".xar")) | .browser_download_url')
        
        # Check if download URL was found
        if [ "$DOWNLOAD_URL" = "null" ] || [ -z "$DOWNLOAD_URL" ]; then
          echo "Error: No .xar asset found in the latest release"
          echo "Available assets:"
          echo "$LATEST_RELEASE" | jq -r '.assets[].name'
          exit 1
        fi
        
        echo "Downloading from: $DOWNLOAD_URL"
        
        # Download the asset
        curl -L -o autodeploy/crApp-latest.xar "$DOWNLOAD_URL"
        
        # Verify the download
        if [ ! -f "autodeploy/crApp-latest.xar" ] || [ ! -s "autodeploy/crApp-latest.xar" ]; then
          echo "Error: Download failed or file is empty"
          exit 1
        fi
        
        echo "Software package downloaded successfully"
        ls -la autodeploy/

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/baumann-digital/baudi-docker
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ env.REGISTRY }}/baumann-digital/baudi-docker:prod
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: EXIST_ENV=production
